<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Prompt 生成器</title>
    <style>
        :root {
            --primary-color: #4F46E5;
            --hover-color: #4338CA;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --border-color: #D1D5DB;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: #1F2937;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        h1 {
            text-align: center;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 24px;
            color: #111827;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .radio-group {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 20px;
            padding: 15px;
            background: #F9FAFB;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .radio-group label {
            margin-bottom: 0;
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 16px;
        }
        .radio-group input {
            margin-right: 8px;
            width: 18px;
            height: 18px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        .output-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }
        @media (max-width: 768px) {
            .output-grid { grid-template-columns: 1fr; }
            .radio-group { grid-template-columns: 1fr; }
        }
        .output-box {
            display: flex;
            flex-direction: column;
        }
        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .output-header h3 {
            margin: 0;
            font-size: 16px;
            color: #374151;
        }
        textarea {
            width: 100%;
            height: 400px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.5;
            resize: vertical;
            background-color: #F9FAFB;
            box-sizing: border-box;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: var(--hover-color);
        }
        button.success {
            background-color: #10B981;
        }
        .export-btn {
            display: block;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            margin-top: 20px;
            background-color: #111827;
        }
        .export-btn:hover {
            background-color: #374151;
        }
    </style>
</head>

<div class="container">
    <h1>🚀 SEO 提示词生成器</h1>

    <!-- 模板选择 -->
    <div class="radio-group">
        <label><input type="radio" name="template" value="1" checked onchange="generate()"> 🏢 Floor (地面清洁)</label>
        <label><input type="radio" name="template" value="2" onchange="generate()"> 💻 Remote Work (远程工作)</label>
        <label><input type="radio" name="template" value="3" onchange="generate()"> 🎵 音乐站</label>
        <label><input type="radio" name="template" value="4" onchange="generate()"> 🎬 视频站</label>
    </div>

    <!-- 变量输入框 -->
    <div class="form-group">
        <label>🎯 核心关键词 (Keyword):</label>
        <input type="text" id="keyword" placeholder="例如: best robot vacuum" oninput="generate()">
    </div>
    <div class="form-group">
        <label>🥈 次关键词 (Secondary Keywords):</label>
        <input type="text" id="secondary" placeholder="例如: robot vacuum for hardwood floors, cheap vacuum..." oninput="generate()">
    </div>
    <div class="form-group">
        <label>🔗 LSI 关键词 (LSI Keywords):</label>
        <input type="text" id="lsi" placeholder="例如: cleaning schedule, battery life, pet hair..." oninput="generate()">
    </div>

    <!-- 输出区 -->
    <div class="output-grid">
        <!-- 第一部分 -->
        <div class="output-box">
            <div class="output-header">
                <h3>📋 第一部分 (大纲与调研)</h3>
                <button onclick="copyText('part1', this)">一键复制</button>
            </div>
            <textarea id="part1" readonly placeholder="填写上方信息后自动生成..."></textarea>
        </div>

        <!-- 第二部分 -->
        <div class="output-box">
            <div class="output-header">
                <h3>✍️ 第二部分 (正文与引用)</h3>
                <button onclick="copyText('part2', this)">一键复制</button>
            </div>
            <textarea id="part2" readonly placeholder="填写上方信息后自动生成..."></textarea>
        </div>
    </div>

    <!-- 下载 TXT 按钮 -->
    <button class="export-btn" onclick="downloadTxt()">📥 下载完整 TXT 文件</button>
</div>

    function fillTemplate(content, keyword, secondary, lsi) {
        return content
            .replaceAll("{{keyword}}", keyword || "[ keyword ]")
            .replaceAll("{{secondary}}", secondary || "[ secondary-keywords ]")
            .replaceAll("{{lsi}}", lsi || "[ LSI-keywords ]");
    }

    function generate() {
        const keyword = document.getElementById('keyword').value;
        const secondary = document.getElementById('secondary').value;
        const lsi = document.getElementById('lsi').value;
        const templateId = document.querySelector('input[name="template"]:checked').value;
        const template = TEMPLATE_CONTENT[templateId];

        document.getElementById('part1').value = fillTemplate(template.part1, keyword, secondary, lsi);
        document.getElementById('part2').value = fillTemplate(template.part2, keyword, secondary, lsi);
    }

    // 一键复制功能
    function copyText(elementId, btnEle) {
        const textarea = document.getElementById(elementId);
        textarea.select();
        textarea.setSelectionRange(0, 99999); // 兼容移动端

        navigator.clipboard.writeText(textarea.value).then(() => {
            const originalText = btnEle.innerText;
            btnEle.innerText = "✅ 已复制!";
            btnEle.classList.add("success");
            setTimeout(() => {
                btnEle.innerText = originalText;
                btnEle.classList.remove("success");
            }, 1500);
        }).catch(err => {
            alert('复制失败，请手动复制');
        });
    }

    // 下载 TXT 功能
    function downloadTxt() {
        const part1 = document.getElementById('part1').value;
        const part2 = document.getElementById('part2').value;
        
        if (!part1 || !part2) {
            alert("请先生成内容！");
            return;
        }

        const fullText = part1 + "\n\n====================\n\n" + part2;
        const blob = new Blob([fullText], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement("a");
        a.href = url;
        
        const safeKeyword = (document.getElementById('keyword').value || 'prompt')
            .replace(/[<>:"/\\|?*\u0000-\u001F]/g, "_")
            .replace(/\s+/g, "_")
            .slice(0, 80);
        a.download = `${safeKeyword}_prompt.txt`;
        
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    // 页面加载时初始化一次
    window.onload = generate;
